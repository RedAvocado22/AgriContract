<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com" rel="preconnect" />
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  .ms { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; line-height: 1; display: inline-block; white-space: nowrap; direction: ltr; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20; }
  .fld { width:100%; height:42px; padding:0 14px; background:#fff; border:1px solid #cbd5e1; border-radius:6px; font-family:inherit; font-size:14px; color:#0f172a; outline:none; }
  .fld:focus { border-color:#16a34a; box-shadow:0 0 0 1px #16a34a; }
  .fld::placeholder { color:#94a3b8; }
</style>
</helmet>
<div style="min-height:100vh; background:#f8fafc; font-family:Geist,system-ui,sans-serif; color:#334155; -webkit-font-smoothing:antialiased; display:flex; align-items:center; justify-content:center; padding:32px;">
  <div style="width:100%; max-width:400px; background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:36px 32px; display:flex; flex-direction:column; gap:24px; align-items:center;">

    <div style="display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center;">
      <div style="width:52px; height:52px; background:#16a34a; color:#fff; border-radius:10px; display:flex; align-items:center; justify-content:center; margin-bottom:6px;"><span class="ms" style="font-size:28px;">eco</span></div>
      <h1 style="font-size:22px; font-weight:600; color:#16a34a; margin:0;">AgriContract</h1>
      <p style="font-size:14px; color:#64748b; margin:0;">Nền tảng số cho nông nghiệp Việt Nam</p>
    </div>

    <form style="width:100%; display:flex; flex-direction:column; gap:16px;">
      <div style="display:flex; flex-direction:column; gap:6px;">
        <label style="font-size:14px; font-weight:600; color:#0f172a;">Email / Tên đăng nhập</label>
        <input class="fld" type="text" placeholder="nhap@email.com" />
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <label style="font-size:14px; font-weight:600; color:#0f172a;">Mật khẩu</label>
          <a href="#" style="font-size:12px; font-weight:500; color:#16a34a; text-decoration:none;">Quên mật khẩu?</a>
        </div>
        <input class="fld" type="password" placeholder="••••••••" />
      </div>
      <button type="submit" style="width:100%; height:42px; background:#16a34a; color:#fff; border:none; border-radius:6px; font-family:inherit; font-size:14px; font-weight:600; display:inline-flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; margin-top:4px;">Đăng nhập<span class="ms" style="font-size:18px;">arrow_forward</span></button>
    </form>

    <div style="width:100%; display:flex; align-items:center; gap:16px;">
      <div style="height:1px; background:#e2e8f0; flex:1;"></div>
      <span style="font-size:12px; font-weight:500; color:#94a3b8; letter-spacing:0.04em;">HOẶC</span>
      <div style="height:1px; background:#e2e8f0; flex:1;"></div>
    </div>

    <button type="button" style="width:100%; height:42px; background:#fff; color:#334155; border:1px solid #cbd5e1; border-radius:6px; font-family:inherit; font-size:14px; font-weight:500; display:inline-flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;"><span class="ms" style="font-size:20px; color:#16a34a;">fingerprint</span>Đăng nhập bằng VNeID</button>

    <div style="width:100%; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding-top:24px; border-top:1px solid #f1f5f9;">
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center;"><span class="ms" style="font-size:20px; color:#64748b;">verified_user</span><span style="font-size:12px; color:#64748b; line-height:16px;">Hợp đồng thông minh</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center;"><span class="ms" style="font-size:20px; color:#64748b;">lock</span><span style="font-size:12px; color:#64748b; line-height:16px;">Escrow an toàn</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center;"><span class="ms" style="font-size:20px; color:#64748b;">gavel</span><span style="font-size:12px; color:#64748b; line-height:16px;">Trọng tài minh bạch</span></div>
    </div>

    <p style="font-size:13px; color:#64748b; text-align:center; margin:0;">Chưa có tài khoản? <a href="#" style="font-weight:600; color:#16a34a; text-decoration:none;">Đăng ký ngay</a></p>
  </div>
</div>
</x-dc>
</body>
</html>
