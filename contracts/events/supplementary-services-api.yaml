openapi: 3.1.0
info:
  title: AgriContract Supplementary Service API (non–golden-flow surfaces)
  version: 1.0.0
  description: >-
    REST surfaces for the five services that sit OUTSIDE the frozen golden-flow
    transport contract (golden-flow-api.yaml): product, pricing, analytics,
    inspection (report submission) and file (internal only). These services are
    primarily event-driven; their events are frozen in golden-flow-events.yaml.
    This file formalizes the REST entry points each service design already
    specifies. Every write requires Idempotency-Key; JWT identity is
    authoritative; role/ownership denial returns 403; the shared 409 error
    envelope covers state/duplicate conflicts (same envelope as golden-flow).
    Sources: product-, pricing-, analytics-, inspection-, file-service
    phase-2 designs. Detailed request/response DTOs are owned by each service
    design; this catalog fixes path, method, owner, auth and idempotency.
servers:
  - url: /
paths:

  # ---------- product-service (public: seller/buyer create) ----------
  /api/v1/plots:
    post:
      operationId: registerPlot
      summary: Register a farm plot (KML import or manual pin); async geo-risk check follows
      description: >-
        Source product-service design §2.2. KML_IMPORT (POLYGON) or MANUAL_PIN
        (POINT only). Geo-risk verification runs async; a plot with
        geoVerificationStatus=PENDING cannot back a listing until CHECKED.
      x-owner: product-service
      x-auth: SELLER
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      responses:
        "201": { description: Plot registry entry created (geo-risk PENDING) }
        "400": { description: Validation failure }
        "403": { description: Role/ownership denied }
        "503": { description: Dependency (user eligibility) unavailable }

  /api/v1/listings:
    post:
      operationId: createListing
      summary: Create a listing from an approved plot/product
      description: >-
        Source product-service design §4. Fails closed when user-service is
        unavailable or actor is not KYC-valid / reputation-locked. Rejected when
        the selected plot is still geoVerificationStatus=PENDING (EUDR
        commodities coffee/rubber only; rice/cashew skip the geo gate).
      x-owner: product-service
      x-auth: SELLER
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListingCreateRequest' }
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListingResponse' }
        "400": { description: Validation failure (e.g. plot geo PENDING) }
        "403": { description: Role/ownership denied or reputation-locked }
        "503": { description: user-service unavailable (fail closed) }
    get:
      operationId: searchListings
      summary: Search/filter listings
      description: Source product-service design; file-service §note defers listing search to product-service query params. Every returned listing includes the opaque listingVersionToken that a new buyer client must echo to CreateContract.
      x-owner: product-service
      x-auth: JWT
      responses:
        "200":
          description: Listing page
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ListingResponse' }

  /api/v1/listings/{listingId}/offers:
    post:
      operationId: createOffer
      summary: Buyer creates an offer against a listing
      description: >-
        Source product-service design §4. Fails closed on user-service outage /
        actor not eligible. The accepted offer becomes the contract seed
        (createContract in golden-flow-api.yaml consumes listingId).
      x-owner: product-service
      x-auth: BUYER
      parameters:
        - { name: listingId, in: path, required: true, schema: { type: string } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      responses:
        "201": { description: Offer created }
        "400": { description: Validation failure }
        "403": { description: Role/ownership denied or reputation-locked }
        "503": { description: user-service unavailable (fail closed) }

  # ---------- pricing-service (public reference prices) ----------
  /api/v1/prices/{commodity}/{province}:
    get:
      operationId: getPriceQuote
      summary: Latest reference price for a commodity/province
      description: >-
        Source pricing-service design §4. Public, no auth (reference data).
        item query param is required for RICE (multiple varieties), optional for
        COFFEE. Cache-aside on Redis with MySQL price_history as source of truth.
      x-owner: pricing-service
      x-auth: public
      parameters:
        - { name: commodity, in: path, required: true, schema: { type: string, enum: [COFFEE, RICE, RUBBER, CASHEW] } }
        - { name: province, in: path, required: true, schema: { type: string } }
        - { name: item, in: query, required: false, schema: { type: string } }
      responses:
        "200": { description: Price quote }
        "404": { description: No quote for commodity/province/item }
  /api/v1/prices/{commodity}/{province}/items:
    get:
      operationId: listPriceItems
      summary: List available item names for a commodity/province (autocomplete)
      description: Source pricing-service design §4; feeds product-service varietyName autocomplete.
      x-owner: pricing-service
      x-auth: public
      parameters:
        - { name: commodity, in: path, required: true, schema: { type: string, enum: [COFFEE, RICE, RUBBER, CASHEW] } }
        - { name: province, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Item name list }
  /api/v1/prices/manual:
    post:
      operationId: recordManualPrice
      summary: Admin records a manual reference price
      description: Source pricing-service design §3.2. Writes price_history with source=ADMIN_MANUAL, province=NULL.
      x-owner: pricing-service
      x-auth: ADMIN
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      responses:
        "201": { description: Manual price recorded }
        "403": { description: Not ADMIN }

  # ---------- analytics-service (dashboard reads, Admin/Association) ----------
  /api/v1/analytics/terminations:
    get:
      operationId: getTerminationAnalytics
      summary: Termination breakdown by type/requester/final role
      description: Source analytics-service design §4. Redis-cached (TTL 1h). Eventual consistency; no historical backfill before deploy.
      x-owner: analytics-service
      x-auth: ADMIN
      parameters:
        - { name: year, in: query, required: true, schema: { type: integer } }
      responses:
        "200": { description: Termination analytics }
        "403": { description: Not ADMIN/Association }
  /api/v1/analytics/escrow-effectiveness:
    get:
      operationId: getEscrowEffectiveness
      summary: Escrow effectiveness metrics for a month
      description: Source analytics-service design §4. Redis-cached (TTL 1h).
      x-owner: analytics-service
      x-auth: ADMIN
      parameters:
        - { name: month, in: query, required: true, schema: { type: string, description: "YYYY-MM" } }
      responses:
        "200": { description: Escrow effectiveness metrics }
        "403": { description: Not ADMIN/Association }
  /api/v1/analytics/force-majeure-trends:
    get:
      operationId: getForceMajeureTrends
      summary: Force-majeure claim trends for a year
      description: Source analytics-service design §4. Redis-cached (TTL 1h).
      x-owner: analytics-service
      x-auth: ADMIN
      parameters:
        - { name: year, in: query, required: true, schema: { type: integer } }
      responses:
        "200": { description: Force-majeure trend metrics }
        "403": { description: Not ADMIN/Association }

  # ---------- inspection-service (Level 1.5 report submission) ----------
  /api/v1/inspections/{contractId}/milestones/{milestoneId}/reports:
    post:
      operationId: submitInspectionReport
      summary: INSPECTOR submits a Level 1.5 report with signature commitment
      description: >-
        Source inspection-service design §2-3. Report body hashed; INSPECTOR
        signature persisted in inspector_signature (inspection DB) with
        UNIQUE(report_id) and step-up/session-freshness identity. Level 2
        commissioning is Admin/system-triggered (InitiateLevel2Inspection) via
        the contract/milestone dispute flow, not a public route.
      x-owner: inspection-service
      x-auth: INSPECTOR
      parameters:
        - { name: contractId, in: path, required: true, schema: { type: string } }
        - { name: milestoneId, in: path, required: true, schema: { type: string } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InspectionReportSubmission' }
      responses:
        "201": { description: Report recorded and signed }
        "403": { description: Not an authorized INSPECTOR for this commission }
        "409": { description: Report already signed (UNIQUE report_id) }

  # ---------- file-service (INTERNAL ONLY — gateway does not expose) ----------
  /internal/v1/files:
    post:
      operationId: storeOnBehalfOf
      summary: Business service stores an end-user file on behalf of an actor (DIRECT_UPLOAD)
      description: >-
        Source file-service design §2.1/§3 (StoreOnBehalfOf, 17/07). Service-to-
        service only (mTLS/service token); gateway never exposes file-service.
        uploadedBy=actingUserId passed explicitly; virus-scan + 10MB cap +
        contentType whitelist enforced; ingestChannel fixed to DIRECT_UPLOAD by
        the entrypoint (caller cannot self-declare SYSTEM_GENERATED).
      x-owner: file-service
      x-auth: service-to-service
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      responses:
        "202": { description: Accepted; file PROCESSING (file.ready/file.failed follows) }
        "400": { description: contentType/size validation failure }
        "403": { description: Not a trusted service principal }
  /internal/v1/files/{fileId}:
    get:
      operationId: getFile
      summary: Fetch file bytes (service-to-service or owner/Admin)
      description: Source file-service design §3. Not public; owning service proxies to end-users.
      x-owner: file-service
      x-auth: service-to-service
      parameters:
        - { name: fileId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: File bytes }
        "403": { description: Not owner/service/Admin }
        "404": { description: Not found or not READY }
    delete:
      operationId: deleteFile
      summary: Owning service requests deletion (explicit; blocked by legal hold)
      description: Source file-service design §3. Two-step tombstone+blob delete; legalHold rejects.
      x-owner: file-service
      x-auth: service-to-service
      parameters:
        - { name: fileId, in: path, required: true, schema: { type: string } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      responses:
        "204": { description: Deletion accepted }
        "409": { description: Legal hold active — deletion denied }
  /internal/v1/files/{fileId}/confirm-attached:
    post:
      operationId: confirmAttached
      summary: Owning service confirms it persisted the fileId (orphan-cleanup guard)
      description: Source file-service design §3. Sets attached=TRUE; unconfirmed files >1 week are orphan-cleaned.
      x-owner: file-service
      x-auth: service-to-service
      parameters:
        - { name: fileId, in: path, required: true, schema: { type: string } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      responses:
        "204": { description: Marked attached }
        "404": { description: Unknown fileId }

components:
  schemas:
    ErrorEnvelope:
      description: Shared error envelope, identical to golden-flow (timestamp,status,error,code,message,path,traceId).
      type: object
    CoffeeQualitySpec:
      type: object
      required: [commodity, type, moisturePercent, foreignMatterPercent, blackBrokenBeansPercent]
      additionalProperties: false
      properties:
        commodity: { const: COFFEE }
        type: { enum: [ARABICA, ROBUSTA] }
        moisturePercent: { type: number, minimum: 0, maximum: 100 }
        foreignMatterPercent: { type: number, minimum: 0, maximum: 100 }
        blackBrokenBeansPercent: { type: number, minimum: 0, maximum: 100 }
      example: { commodity: COFFEE, type: ROBUSTA, moisturePercent: 12.5, foreignMatterPercent: 0.5, blackBrokenBeansPercent: 5.0 }
    RiceQualitySpec:
      type: object
      required: [commodity, varietyName, brokenPercent, moisturePercent, chalkyKernelPercent, foreignMatterPercent, purityPercent]
      additionalProperties: false
      properties:
        commodity: { const: RICE }
        varietyName: { type: string, minLength: 1 }
        brokenPercent: { type: number, minimum: 0, maximum: 100 }
        moisturePercent: { type: number, minimum: 0, maximum: 100 }
        chalkyKernelPercent: { type: number, minimum: 0, maximum: 100 }
        foreignMatterPercent: { type: number, minimum: 0, maximum: 100 }
        purityPercent: { type: number, minimum: 0, maximum: 100 }
      example: { commodity: RICE, varietyName: ST25, brokenPercent: 5.0, moisturePercent: 14.0, chalkyKernelPercent: 3.0, foreignMatterPercent: 0.2, purityPercent: 98.0 }
    RubberQualitySpec:
      type: object
      required: [commodity, grade, dirtPercent, ashPercent, volatileMatterPercent, nitrogenPercent, plasticityRetentionIndex]
      additionalProperties: false
      properties:
        commodity: { const: RUBBER }
        grade: { enum: [SVR_3L, SVR_5, SVR_10, SVR_20] }
        dirtPercent: { type: number, minimum: 0, maximum: 100 }
        ashPercent: { type: number, minimum: 0, maximum: 100 }
        volatileMatterPercent: { type: number, minimum: 0, maximum: 100 }
        nitrogenPercent: { type: number, minimum: 0, maximum: 100 }
        plasticityRetentionIndex: { type: number, minimum: 0, maximum: 100 }
      example: { commodity: RUBBER, grade: SVR_10, dirtPercent: 0.08, ashPercent: 0.6, volatileMatterPercent: 0.8, nitrogenPercent: 0.6, plasticityRetentionIndex: 50 }
    CashewQualitySpec:
      type: object
      required: [commodity, grade, moisturePercent, defectiveKernelPercent, foreignMatterPercent, kernelOutturnLbsPer80Kg]
      additionalProperties: false
      properties:
        commodity: { const: CASHEW }
        grade: { enum: [W180, W210, W240, W320, W450] }
        moisturePercent: { type: number, minimum: 0, maximum: 100 }
        defectiveKernelPercent: { type: number, minimum: 0, maximum: 100 }
        foreignMatterPercent: { type: number, minimum: 0, maximum: 100 }
        kernelOutturnLbsPer80Kg: { type: number, minimum: 0, maximum: 80 }
      example: { commodity: CASHEW, grade: W320, moisturePercent: 5.0, defectiveKernelPercent: 8.0, foreignMatterPercent: 0.5, kernelOutturnLbsPer80Kg: 48 }
    ListingCreateCommon:
      type: object
      required: [productId, categoryId, commodity, productName, unitOfMeasure, offeredQuantity, askingUnitPrice, regionText, registryEntryIds]
      properties:
        productId: { type: string, format: uuid }
        categoryId: { type: string, format: uuid }
        commodity: { enum: [COFFEE, RICE, RUBBER, CASHEW] }
        productName: { type: string, minLength: 1 }
        unitOfMeasure: { const: KG, description: Compatibility confirmation of the system-wide canonical kilogram unit; no separate quantityUnit is introduced. }
        offeredQuantity: { type: number, exclusiveMinimum: 0, description: Offered quantity in canonical kilograms (kg). }
        askingUnitPrice: { type: string, pattern: '^[0-9]+\.[0-9]{2}$', maxLength: 11, description: "Technical maximum 99,999,999.99 VND/kg; this is not a business pricing policy." }
        regionText: { type: string, minLength: 1 }
        registryEntryIds: { type: array, items: { type: string, format: uuid } }
    CoffeeListingCreate:
      allOf:
        - { $ref: '#/components/schemas/ListingCreateCommon' }
        - type: object
          required: [declaredQualitySpec]
          properties:
            commodity: { const: COFFEE }
            declaredQualitySpec: { $ref: '#/components/schemas/CoffeeQualitySpec' }
            registryEntryIds: { type: array, minItems: 1, items: { type: string, format: uuid } }
            traceabilityEvidencePackageId: { type: [string, 'null'], format: uuid }
      unevaluatedProperties: false
    RiceListingCreate:
      allOf:
        - { $ref: '#/components/schemas/ListingCreateCommon' }
        - type: object
          required: [declaredQualitySpec]
          properties:
            commodity: { const: RICE }
            declaredQualitySpec: { $ref: '#/components/schemas/RiceQualitySpec' }
            registryEntryIds: { type: array, maxItems: 0, items: { type: string, format: uuid } }
      unevaluatedProperties: false
    RubberListingCreate:
      allOf:
        - { $ref: '#/components/schemas/ListingCreateCommon' }
        - type: object
          required: [declaredQualitySpec]
          properties:
            commodity: { const: RUBBER }
            declaredQualitySpec: { $ref: '#/components/schemas/RubberQualitySpec' }
            registryEntryIds: { type: array, minItems: 1, items: { type: string, format: uuid } }
            traceabilityEvidencePackageId: { type: [string, 'null'], format: uuid }
      unevaluatedProperties: false
    CashewListingCreate:
      allOf:
        - { $ref: '#/components/schemas/ListingCreateCommon' }
        - type: object
          required: [declaredQualitySpec]
          properties:
            commodity: { const: CASHEW }
            declaredQualitySpec: { $ref: '#/components/schemas/CashewQualitySpec' }
            registryEntryIds: { type: array, maxItems: 0, items: { type: string, format: uuid } }
      unevaluatedProperties: false
    ListingCreateRequest:
      oneOf:
        - { $ref: '#/components/schemas/CoffeeListingCreate' }
        - { $ref: '#/components/schemas/RiceListingCreate' }
        - { $ref: '#/components/schemas/RubberListingCreate' }
        - { $ref: '#/components/schemas/CashewListingCreate' }
      discriminator:
        propertyName: commodity
    ListingResponseCommon:
      allOf:
        - { $ref: '#/components/schemas/ListingCreateCommon' }
        - type: object
          required: [listingId, sellerId, status, legacyQualitySpecMissing, listingVersionToken]
          properties:
            listingId: { type: string, format: uuid }
            sellerId: { type: string, format: uuid }
            status: { enum: [DRAFT, PUBLISHED, PAUSED, CLOSED] }
            legacyQualitySpecMissing: { type: boolean, description: Legacy rows may be true until their next edit or republish. }
            listingVersionToken: { type: string, minLength: 1, description: Opaque optimistic-concurrency token generated from the canonical UTC representation of Listing.updatedAt in Phase 2; clients must echo the exact value when creating a contract. }
    CoffeeListingResponse:
      allOf:
        - { $ref: '#/components/schemas/ListingResponseCommon' }
        - type: object
          required: [declaredQualitySpec]
          properties:
            commodity: { const: COFFEE }
            declaredQualitySpec:
              oneOf: [{ $ref: '#/components/schemas/CoffeeQualitySpec' }, { type: 'null' }]
            registryEntryIds: { type: array, minItems: 1, items: { type: string, format: uuid } }
            traceabilityEvidencePackageId: { type: [string, 'null'], format: uuid }
      unevaluatedProperties: false
    RiceListingResponse:
      allOf:
        - { $ref: '#/components/schemas/ListingResponseCommon' }
        - type: object
          required: [declaredQualitySpec]
          properties:
            commodity: { const: RICE }
            declaredQualitySpec:
              oneOf: [{ $ref: '#/components/schemas/RiceQualitySpec' }, { type: 'null' }]
            registryEntryIds: { type: array, maxItems: 0, items: { type: string, format: uuid } }
      unevaluatedProperties: false
    RubberListingResponse:
      allOf:
        - { $ref: '#/components/schemas/ListingResponseCommon' }
        - type: object
          required: [declaredQualitySpec]
          properties:
            commodity: { const: RUBBER }
            declaredQualitySpec:
              oneOf: [{ $ref: '#/components/schemas/RubberQualitySpec' }, { type: 'null' }]
            registryEntryIds: { type: array, minItems: 1, items: { type: string, format: uuid } }
            traceabilityEvidencePackageId: { type: [string, 'null'], format: uuid }
      unevaluatedProperties: false
    CashewListingResponse:
      allOf:
        - { $ref: '#/components/schemas/ListingResponseCommon' }
        - type: object
          required: [declaredQualitySpec]
          properties:
            commodity: { const: CASHEW }
            declaredQualitySpec:
              oneOf: [{ $ref: '#/components/schemas/CashewQualitySpec' }, { type: 'null' }]
            registryEntryIds: { type: array, maxItems: 0, items: { type: string, format: uuid } }
      unevaluatedProperties: false
    ListingResponse:
      oneOf:
        - { $ref: '#/components/schemas/CoffeeListingResponse' }
        - { $ref: '#/components/schemas/RiceListingResponse' }
        - { $ref: '#/components/schemas/RubberListingResponse' }
        - { $ref: '#/components/schemas/CashewListingResponse' }
      discriminator:
        propertyName: commodity
      x-invariant: declaredQualitySpec may be null only for a legacy row with legacyQualitySpecMissing=true; edit or republish must supply the matching non-null variant.
    CoffeeActualMetrics:
      type: object
      required: [commodity, type, moisturePercent, foreignMatterPercent, blackBrokenBeansPercent]
      additionalProperties: false
      properties:
        commodity: { const: COFFEE }
        type: { enum: [ARABICA, ROBUSTA] }
        moisturePercent: { type: number, minimum: 0, maximum: 100 }
        foreignMatterPercent: { type: number, minimum: 0, maximum: 100 }
        blackBrokenBeansPercent: { type: number, minimum: 0, maximum: 100 }
      example: { commodity: COFFEE, type: ROBUSTA, moisturePercent: 13.0, foreignMatterPercent: 0.7, blackBrokenBeansPercent: 5.5 }
    RiceActualMetrics:
      description: varietyName is intentionally absent because it is an identity attribute, not an inspected metric.
      type: object
      required: [commodity, brokenPercent, moisturePercent, chalkyKernelPercent, foreignMatterPercent, purityPercent]
      additionalProperties: false
      properties:
        commodity: { const: RICE }
        brokenPercent: { type: number, minimum: 0, maximum: 100 }
        moisturePercent: { type: number, minimum: 0, maximum: 100 }
        chalkyKernelPercent: { type: number, minimum: 0, maximum: 100 }
        foreignMatterPercent: { type: number, minimum: 0, maximum: 100 }
        purityPercent: { type: number, minimum: 0, maximum: 100 }
      example: { commodity: RICE, brokenPercent: 6.0, moisturePercent: 14.2, chalkyKernelPercent: 3.5, foreignMatterPercent: 0.3, purityPercent: 97.5 }
    RubberActualMetrics:
      type: object
      required: [commodity, grade, dirtPercent, ashPercent, volatileMatterPercent, nitrogenPercent, plasticityRetentionIndex]
      additionalProperties: false
      properties:
        commodity: { const: RUBBER }
        grade: { enum: [SVR_3L, SVR_5, SVR_10, SVR_20] }
        dirtPercent: { type: number, minimum: 0, maximum: 100 }
        ashPercent: { type: number, minimum: 0, maximum: 100 }
        volatileMatterPercent: { type: number, minimum: 0, maximum: 100 }
        nitrogenPercent: { type: number, minimum: 0, maximum: 100 }
        plasticityRetentionIndex: { type: number, minimum: 0, maximum: 100 }
      example: { commodity: RUBBER, grade: SVR_10, dirtPercent: 0.09, ashPercent: 0.65, volatileMatterPercent: 0.85, nitrogenPercent: 0.62, plasticityRetentionIndex: 48 }
    CashewActualMetrics:
      type: object
      required: [commodity, grade, moisturePercent, defectiveKernelPercent, foreignMatterPercent, kernelOutturnLbsPer80Kg]
      additionalProperties: false
      properties:
        commodity: { const: CASHEW }
        grade: { enum: [W180, W210, W240, W320, W450] }
        moisturePercent: { type: number, minimum: 0, maximum: 100 }
        defectiveKernelPercent: { type: number, minimum: 0, maximum: 100 }
        foreignMatterPercent: { type: number, minimum: 0, maximum: 100 }
        kernelOutturnLbsPer80Kg: { type: number, minimum: 0, maximum: 80 }
      example: { commodity: CASHEW, grade: W320, moisturePercent: 5.3, defectiveKernelPercent: 8.5, foreignMatterPercent: 0.6, kernelOutturnLbsPer80Kg: 47.5 }
    ActualQualityMetrics:
      oneOf:
        - { $ref: '#/components/schemas/CoffeeActualMetrics' }
        - { $ref: '#/components/schemas/RiceActualMetrics' }
        - { $ref: '#/components/schemas/RubberActualMetrics' }
        - { $ref: '#/components/schemas/CashewActualMetrics' }
      discriminator:
        propertyName: commodity
    InspectionSettlementResultV1:
      description: Quantity, measurement status and typed actual metrics only. Delivery certificates and quality disposition are outside normalizedResult/resultHash.
      type: object
      required: [resultSchemaVersion, measuredQuantityKg, acceptedQuantityKg, measurementStatus, actualQualityMetrics, determinedAt]
      additionalProperties: false
      allOf:
        - if:
            properties: { measurementStatus: { const: INCONCLUSIVE } }
            required: [measurementStatus]
          then:
            required: [inconclusiveReasons]
            properties:
              inconclusiveReasons: {}
      properties:
        resultSchemaVersion: { const: '1.0' }
        measuredQuantityKg: { type: number, minimum: 0, description: Inspector-measured quantity in canonical kilograms (kg). }
        acceptedQuantityKg: { type: number, minimum: 0, description: Quantity accepted for entitlement in canonical kilograms (kg). }
        measurementStatus: { enum: [COMPLETE, INCONCLUSIVE] }
        actualQualityMetrics: { $ref: '#/components/schemas/ActualQualityMetrics' }
        inconclusiveReasons: { type: array, minItems: 1, items: { type: string, minLength: 1 } }
        determinedAt: { type: string, format: date-time }
      x-invariant: acceptedQuantityKg must not exceed measuredQuantityKg; inconclusiveReasons is required when measurementStatus is INCONCLUSIVE; no delivery certificate may be parsed or copied into actualQualityMetrics.
    InspectionReportSubmission:
      type: object
      required: [reportFileId, normalizedResult]
      additionalProperties: false
      properties:
        reportFileId: { type: string, format: uuid }
