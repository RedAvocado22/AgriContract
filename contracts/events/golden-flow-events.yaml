              entryType: {const: REFUND_TO_BUYER}
              amount: {$ref: "#/$defs/positiveMoney"}
              sourceEventId: {$ref: "#/$defs/uuid"}
            additionalProperties: false
        x-publisher: escrow-service
        x-consumers: [bank-service]
        x-source: bank-service-phase2-design.md sections 3.1-3.3; SDS Event Catalog 4.2
  bankRefundCompleted:
