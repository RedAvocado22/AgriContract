              userId: {$ref: "#/$defs/uuid"}
              entryType: {enum: [DEPOSIT_FORFEITURE, CONTRACTUAL_PENALTY, DAMAGES_COMPENSATION]}
              fundType: {$ref: "#/$defs/fundType"}
              remedyDecisionId: {$ref: "#/$defs/uuid"}
              remedyLegId: {$ref: "#/$defs/uuid"}
              amount: {$ref: "#/$defs/positiveMoney"}
