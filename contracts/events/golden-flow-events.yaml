          contract-service deduplicates by eventId/reportId, verifies resultHash and
          reportHash, and applies the immutable result only to the matching CONTESTED
          milestone. It computes min(batchAmount, acceptedQuantityKg * agreedPrice)
          and does not apply tolerance a second time. No raw content or file is carried.
        x-hash-contract:
          resultHash: SHA256(RFC8785 canonical JSON of normalizedResult)
          reportHash: SHA256(RFC8785 canonical JSON of report identity, reportFileHash, resultHash, confirmedAt and actor/source identity)
