        properties:
          eventType: {const: inspection.report_confirmed}
          producer: {const: inspection-service}
          payload:
            type: object
            required: [reportId, contractId, milestoneId, tier, normalizedResult, resultHash, reportFileHash, reportHash, confirmedAt]
