$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://agricontract.local/contracts/events/golden-flow-events.yaml"
title: AgriContract Canonical Golden-Flow Events
description: >-
  Exact event names and explicitly designed payload fields for the Phase 2 golden flow.
  Payloads intentionally remain open where the authoritative design does not freeze all
  fields. x-source records the authoritative source.
x-bank-idempotency:
  request: payload.sourceEventId MUST equal envelope.eventId for every bank.*_requested event.
  result: payload.sourceEventId preserves request eventId; result causationId MUST equal request eventId.
  replay: Replayed requests preserve eventId and payload; zero-value and negative commands are invalid.
$defs:
  money:
    type: string
    pattern: "^[0-9]+\\.[0-9]{2}$"
    maxLength: 19
    description: Non-negative VND value capped at 9,999,999,999,999,999.99 to match DECIMAL(18,2).
  positiveMoney:
    type: string
    pattern: "^(?:0\\.(?:0[1-9]|[1-9][0-9])|[1-9][0-9]*\\.[0-9]{2})$"
    maxLength: 19
    description: Strictly positive money for bank commands; zero-value commands are omitted.
  uuid:
    type: string
    format: uuid
  nullableUuid:
    oneOf:
      - $ref: "#/$defs/uuid"
      - type: "null"
  positiveQuantityKg:
    type: number
    exclusiveMinimum: 0
    description: Strictly positive quantity in the system-wide canonical kilogram (kg) unit.
  fundType:
    enum: [BUYER_DEPOSIT, SELLER_DEPOSIT, MILESTONE_PAYMENT]
  ledgerEntryType:
    enum: [LOCK_BUYER_DEPOSIT, LOCK_SELLER_DEPOSIT, LOCK_MILESTONE, RELEASE_TO_SELLER, REFUND_TO_BUYER, DEPOSIT_FORFEITURE, CONTRACTUAL_PENALTY, DAMAGES_COMPENSATION]
  remedyType:
    enum: [NONE, PAYMENT_SETTLEMENT, PAYMENT_REFUND, DEPOSIT_FORFEITURE, CONTRACTUAL_PENALTY, DAMAGES_COMPENSATION]
  breachingRole:
    oneOf:
      - enum: [BUYER, SELLER]
      - type: "null"
  breachReasonCode:
    enum: [NON_DELIVERY, SHORTFALL, LATE_DELIVERY, QUALITY_BELOW_COMMITTED, SIDE_SELLING, PRODUCTION_SHOCK_NON_FM, FUNDING_FAILURE, LATE_PAYMENT, FAILURE_TO_RECEIVE, WRONGFUL_REJECTION, FORCE_MAJEURE, MUTUAL_EXIT, ACTIVATION_FAILURE]
  nullableBreachReasonCode:
    oneOf:
      - $ref: "#/$defs/breachReasonCode"
      - type: "null"
  finalQualityDisposition:
    oneOf:
      - enum: [CONFORMING, PARTIALLY_CONFORMING, NON_CONFORMING]
      - type: "null"
  coffeeActualMetrics:
    type: object
    required: [commodity, type, moisturePercent, foreignMatterPercent, blackBrokenBeansPercent]
    additionalProperties: false
    properties:
      commodity: {const: COFFEE}
      type: {enum: [ARABICA, ROBUSTA]}
      moisturePercent: {type: number, minimum: 0, maximum: 100}
      foreignMatterPercent: {type: number, minimum: 0, maximum: 100}
      blackBrokenBeansPercent: {type: number, minimum: 0, maximum: 100}
    examples:
      - {commodity: COFFEE, type: ROBUSTA, moisturePercent: 13.0, foreignMatterPercent: 0.7, blackBrokenBeansPercent: 5.5}
  riceActualMetrics:
    description: varietyName is intentionally absent; rice identity cannot cause inspection rejection.
    type: object
    required: [commodity, brokenPercent, moisturePercent, chalkyKernelPercent, foreignMatterPercent, purityPercent]
    additionalProperties: false
    properties:
      commodity: {const: RICE}
      brokenPercent: {type: number, minimum: 0, maximum: 100}
      moisturePercent: {type: number, minimum: 0, maximum: 100}
      chalkyKernelPercent: {type: number, minimum: 0, maximum: 100}
      foreignMatterPercent: {type: number, minimum: 0, maximum: 100}
      purityPercent: {type: number, minimum: 0, maximum: 100}
    examples:
      - {commodity: RICE, brokenPercent: 6.0, moisturePercent: 14.2, chalkyKernelPercent: 3.5, foreignMatterPercent: 0.3, purityPercent: 97.5}
  rubberActualMetrics:
    type: object
    required: [commodity, grade, dirtPercent, ashPercent, volatileMatterPercent, nitrogenPercent, plasticityRetentionIndex]
    additionalProperties: false
    properties:
      commodity: {const: RUBBER}
      grade: {enum: [SVR_3L, SVR_5, SVR_10, SVR_20]}
      dirtPercent: {type: number, minimum: 0, maximum: 100}
      ashPercent: {type: number, minimum: 0, maximum: 100}
      volatileMatterPercent: {type: number, minimum: 0, maximum: 100}
      nitrogenPercent: {type: number, minimum: 0, maximum: 100}
      plasticityRetentionIndex: {type: number, minimum: 0, maximum: 100}
    examples:
      - {commodity: RUBBER, grade: SVR_10, dirtPercent: 0.09, ashPercent: 0.65, volatileMatterPercent: 0.85, nitrogenPercent: 0.62, plasticityRetentionIndex: 48}
  cashewActualMetrics:
    type: object
    required: [commodity, grade, moisturePercent, defectiveKernelPercent, foreignMatterPercent, kernelOutturnLbsPer80Kg]
    additionalProperties: false
    properties:
      commodity: {const: CASHEW}
      grade: {enum: [W180, W210, W240, W320, W450]}
      moisturePercent: {type: number, minimum: 0, maximum: 100}
      defectiveKernelPercent: {type: number, minimum: 0, maximum: 100}
      foreignMatterPercent: {type: number, minimum: 0, maximum: 100}
      kernelOutturnLbsPer80Kg: {type: number, minimum: 0, maximum: 80}
    examples:
      - {commodity: CASHEW, grade: W320, moisturePercent: 5.3, defectiveKernelPercent: 8.5, foreignMatterPercent: 0.6, kernelOutturnLbsPer80Kg: 47.5}
  actualQualityMetrics:
    oneOf:
      - $ref: "#/$defs/coffeeActualMetrics"
      - $ref: "#/$defs/riceActualMetrics"
      - $ref: "#/$defs/rubberActualMetrics"
      - $ref: "#/$defs/cashewActualMetrics"
  inspectionSettlementResultV1:
    type: object
    required: [resultSchemaVersion, measuredQuantityKg, acceptedQuantityKg, measurementStatus, actualQualityMetrics, determinedAt]
    additionalProperties: false
    allOf:
      - if:
          properties: {measurementStatus: {const: INCONCLUSIVE}}
          required: [measurementStatus]
        then:
          required: [inconclusiveReasons]
          properties:
            inconclusiveReasons: {}
    properties:
      resultSchemaVersion: {const: "1.0"}
      measuredQuantityKg: {type: number, minimum: 0, description: Inspector-measured quantity in canonical kilograms (kg).}
      acceptedQuantityKg: {type: number, minimum: 0, description: Quantity accepted for entitlement in canonical kilograms (kg).}
      measurementStatus: {enum: [COMPLETE, INCONCLUSIVE]}
      actualQualityMetrics: {$ref: "#/$defs/actualQualityMetrics"}
      inconclusiveReasons:
        type: array
        minItems: 1
        items: {type: string, minLength: 1}
      determinedAt: {type: string, format: date-time}
    x-invariant: acceptedQuantityKg must be <= measuredQuantityKg; inconclusiveReasons is required when measurementStatus is INCONCLUSIVE.
  baseEnvelope:
    $ref: "./event-envelope.yaml"
  contractCreated:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: contract.created}
          producer: {const: contract-service}
          payload:
            type: object
            required: [contractId, listingId, reservedQuantity, createdAt]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              listingId: {$ref: "#/$defs/uuid"}
              reservedQuantity: {$ref: "#/$defs/positiveQuantityKg"}
              createdAt: {type: string, format: date-time}
            additionalProperties: false
        x-publisher: contract-service
        x-consumers: [product-service]
        x-source: milestone-escrow-phase2-design.md sections 2.1d and 7.2; product-phase2-design.md section 8b.2
        x-verification-matrix: [11r, 28]
        x-side-effect-boundary: Confirms the synchronous product reservation is attached to a persisted OFFERED contract; product-service MUST NOT decrement inventory again.
  contractWithdrawn:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: contract.withdrawn}
          producer: {const: contract-service}
          payload:
            type: object
            required: [contractId, listingId, reservedQuantity, withdrawnAt]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              listingId: {$ref: "#/$defs/uuid"}
              reservedQuantity: {$ref: "#/$defs/positiveQuantityKg"}
              withdrawnAt: {type: string, format: date-time}
            additionalProperties: false
        x-publisher: contract-service
        x-consumers: [product-service]
        x-source: milestone-escrow-phase2-design.md sections 2.1d, 6.1 and 7.2; product-phase2-design.md section 8b.2
        x-verification-matrix: [11r, 28b]
        x-side-effect-boundary: Inventory-only lifecycle signal for pre-sign release; contract.terminated WITHDRAW_OFFER remains the audit/analytics lifecycle observation.
  contractSigned:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: contract.signed}
          producer: {const: contract-service}
          payload:
            type: object
            required: [contractId, listingId, reservedQuantity, commodity, buyerId, sellerId, totalAmount, buyerDepositAmount, sellerDepositAmount, signedContentHash, signedAt]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              listingId: {$ref: "#/$defs/uuid"}
              reservedQuantity: {$ref: "#/$defs/positiveQuantityKg"}
              commodity: {enum: [COFFEE, RICE, RUBBER, CASHEW]}
              buyerId: {$ref: "#/$defs/uuid"}
              sellerId: {$ref: "#/$defs/uuid"}
              totalAmount: {$ref: "#/$defs/money"}
              buyerDepositAmount: {$ref: "#/$defs/money"}
              sellerDepositAmount: {$ref: "#/$defs/money"}
              signedContentHash: {type: string, pattern: "^[a-f0-9]{64}$"}
              signedAt: {type: string, format: date-time}
            additionalProperties: false
        x-publisher: contract-service
        x-consumers: [product-service, escrow-service, analytics-service, audit-service]
        x-source: milestone-escrow-phase2-design.md sections 2.1d and 7.2
        x-verification-matrix: [3, 11c, 11f, 11s]
        x-inventory-semantics: Product-service moves RESERVED to SIGNED_RELEASABLE; SIGNED is not the hard inventory commit point.
  contractActivationFailed:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: contract.activation_failed}
          producer: {const: contract-service}
          payload:
            type: object
            required: [contractId, listingId, reservedQuantity, activationFailedAt]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              listingId: {$ref: "#/$defs/uuid"}
              reservedQuantity: {$ref: "#/$defs/positiveQuantityKg"}
              activationFailedAt: {type: string, format: date-time}
            additionalProperties: false
        x-publisher: contract-service
        x-consumers: [product-service]
        x-source: milestone-escrow-phase2-design.md sections 2.1d, 3.1 and 7.2; product-phase2-design.md section 8b.2
        x-verification-matrix: [11b, 11r, 11s, 28b]
        x-terminal-guard: Published only after partial deposit refunds reconcile and the contract commits terminal ACTIVATION_FAILED.
  contractActivated:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: contract.activated}
          producer: {const: contract-service}
          payload:
            type: object
            required: [contractId, listingId, reservedQuantity, activatedAt]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              listingId: {$ref: "#/$defs/uuid"}
              reservedQuantity: {$ref: "#/$defs/positiveQuantityKg"}
              activatedAt: {type: string, format: date-time}
            additionalProperties: false
        x-publisher: contract-service
        x-consumers: [product-service]
        x-source: milestone-escrow-phase2-design.md sections 2.1d, 3.1 and 7.2; product-phase2-design.md section 8b.2
        x-verification-matrix: [11s]
        x-inventory-semantics: Hard commit point; product-service moves SIGNED_RELEASABLE to COMMITTED and later activation-failure release is invalid.
  escrowDepositLocked:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: escrow.deposit_locked}
          producer: {const: escrow-service}
          payload:
            type: object
            required: [contractId, buyerDepositState, sellerDepositState]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              buyerDepositState: {enum: [DEPOSIT_LOCKED, DEPOSIT_RELEASED, DEPOSIT_SEIZED]}
              sellerDepositState: {enum: [DEPOSIT_LOCKED, DEPOSIT_RELEASED, DEPOSIT_SEIZED]}
            additionalProperties: false
        x-publisher: escrow-service
        x-consumers: [contract-service, escrow-service]
        x-source: milestone-escrow-phase2-design.md section 7.2
        x-verification-matrix: [11]
  escrowDepositLockFailed:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: escrow.deposit_lock_failed}
          producer: {const: escrow-service}
          payload:
            type: object
            required: [contractId, failedLeg, buyerDepositState, sellerDepositState, reason]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              failedLeg: {enum: [BUYER, SELLER, BOTH]}
              buyerDepositState: {type: string}
              sellerDepositState: {type: string}
              reason: {type: string, minLength: 1}
            additionalProperties: false
        x-publisher: escrow-service
        x-consumers: [contract-service]
        x-source: milestone-escrow-phase2-design.md sections 3.1 and 7.2
        x-verification-matrix: [11, 11b]
  bankLockRequested:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: bank.lock_requested}
          producer: {const: escrow-service}
          payload:
            type: object
            required: [contractId, userId, entryType, fundType, remedyDecisionId, remedyLegId, amount, sourceEventId]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              milestoneId: {oneOf: [{$ref: "#/$defs/uuid"}, {type: "null"}]}
              userId: {$ref: "#/$defs/uuid"}
              entryType: {enum: [LOCK_BUYER_DEPOSIT, LOCK_SELLER_DEPOSIT, LOCK_MILESTONE]}
              fundType: {$ref: "#/$defs/fundType"}
              remedyDecisionId: {$ref: "#/$defs/nullableUuid"}
              remedyLegId: {$ref: "#/$defs/nullableUuid"}
              amount: {$ref: "#/$defs/positiveMoney"}
              sourceEventId: {$ref: "#/$defs/uuid"}
            additionalProperties: false
        x-publisher: escrow-service
        x-consumers: [bank-service]
        x-source: bank-service-phase2-design.md section 3
        x-verification-matrix: [1, 6, 9]
        x-requires-correlation: true
  bankLockCompleted:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: bank.lock_completed}
          producer: {const: bank-service}
          payload:
            type: object
            required: [contractId, userId, entryType, fundType, remedyDecisionId, remedyLegId, amount, sourceEventId, ledgerEntryId]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              milestoneId: {oneOf: [{$ref: "#/$defs/uuid"}, {type: "null"}]}
              userId: {$ref: "#/$defs/uuid"}
              entryType: {enum: [LOCK_BUYER_DEPOSIT, LOCK_SELLER_DEPOSIT, LOCK_MILESTONE]}
              fundType: {$ref: "#/$defs/fundType"}
              remedyDecisionId: {$ref: "#/$defs/nullableUuid"}
              remedyLegId: {$ref: "#/$defs/nullableUuid"}
              amount: {$ref: "#/$defs/positiveMoney"}
              sourceEventId: {$ref: "#/$defs/uuid"}
              ledgerEntryId: {$ref: "#/$defs/uuid"}
            additionalProperties: false
        x-publisher: bank-service
        x-consumers: [escrow-service]
        x-source: bank-service-phase2-design.md section 3
        x-contract-note: sourceEventId preserves the request eventId; request payload.sourceEventId equals request envelope eventId and result causationId equals that request eventId.
        x-requires-correlation: true
        x-requires-causation: true
  bankLockFailed:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: bank.lock_failed}
          producer: {const: bank-service}
          payload:
            type: object
            required: [contractId, userId, entryType, fundType, remedyDecisionId, remedyLegId, amount, sourceEventId, failureReason]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              milestoneId: {oneOf: [{$ref: "#/$defs/uuid"}, {type: "null"}]}
              userId: {$ref: "#/$defs/uuid"}
              entryType: {enum: [LOCK_BUYER_DEPOSIT, LOCK_SELLER_DEPOSIT, LOCK_MILESTONE]}
              fundType: {$ref: "#/$defs/fundType"}
              remedyDecisionId: {$ref: "#/$defs/nullableUuid"}
              remedyLegId: {$ref: "#/$defs/nullableUuid"}
              amount: {$ref: "#/$defs/positiveMoney"}
              sourceEventId: {$ref: "#/$defs/uuid"}
              failureReason: {type: string, minLength: 1}
            additionalProperties: false
        x-publisher: bank-service
        x-consumers: [escrow-service]
        x-source: bank-service-phase2-design.md section 3
        x-contract-note: No retryability enum is added; escrow applies the retry policy from milestone-escrow design.
  bankReleaseRequested:
