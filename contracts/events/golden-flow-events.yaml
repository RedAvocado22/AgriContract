            properties:
              contractId: {$ref: "#/$defs/uuid"}
              buyerId: {$ref: "#/$defs/uuid"}
              sellerId: {$ref: "#/$defs/uuid"}
            additionalProperties: false
        x-publisher: contract-service
        x-consumers: [escrow-service, reputation-service, analytics-service]
        x-source: milestone-escrow-phase2-design.md section 7.2; existing ContractSettledEvent
        x-verification-matrix: [8]
  contractCancelled:
