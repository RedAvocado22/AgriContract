          producer: {const: bank-service}
          payload:
            type: object
            required: [contractId, userId, entryType, amount, sourceEventId, ledgerEntryId]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              milestoneId: {oneOf: [{$ref: "#/$defs/uuid"}, {type: "null"}]}
