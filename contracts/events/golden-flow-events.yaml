      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: contract.cancelled}
          producer: {const: contract-service}
          payload:
            type: object
            required: [contractId, initiatedBy]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              initiatedBy: {enum: [BUYER, SELLER]}
            additionalProperties: false
        x-publisher: contract-service
        x-consumers: [escrow-service, analytics-service]
        x-source: milestone-escrow-phase2-design.md sections 6.3 and 7.2
        x-verification-matrix: [8]
  milestoneSettled:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: milestone.settled}
          producer: {const: contract-service}
          payload:
            type: object
            required: [contractId, milestoneId, lockedAmount, actualAmount, recipients]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              milestoneId: {$ref: "#/$defs/uuid"}
              lockedAmount: {$ref: "#/$defs/money"}
              actualAmount: {$ref: "#/$defs/money"}
              recipients:
                type: array
                items:
                  type: object
                  required: [userId, email, role]
                  properties:
                    userId: {$ref: "#/$defs/uuid"}
