        x-publisher: bank-service
        x-consumers: [escrow-service]
        x-source: bank-service-phase2-design.md section 3; SDS Event Catalog 4.2
  bankRefundRequested:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: bank.refund_requested}
          producer: {const: escrow-service}
          payload:
            type: object
            required: [contractId, userId, entryType, fundType, remedyDecisionId, remedyLegId, amount, sourceEventId]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              milestoneId: {oneOf: [{$ref: "#/$defs/uuid"}, {type: "null"}]}
              userId: {$ref: "#/$defs/uuid"}
