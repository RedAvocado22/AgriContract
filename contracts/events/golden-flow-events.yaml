  bankSeizeCompleted:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: bank.seize_completed}
          producer: {const: bank-service}
          payload:
            type: object
            required: [contractId, userId, entryType, fundType, remedyDecisionId, remedyLegId, amount, sourceEventId, ledgerEntryId]
