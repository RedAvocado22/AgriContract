$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://agricontract.local/contracts/events/golden-flow-events.yaml"
title: AgriContract Canonical Golden-Flow Events
description: >-
  Exact event names and explicitly designed payload fields for the Phase 2 golden flow.
  Payloads intentionally remain open where the authoritative design does not freeze all
  fields. x-source records the authoritative source.
x-bank-idempotency:
  request: payload.sourceEventId MUST equal envelope.eventId for every bank.*_requested event.
  result: payload.sourceEventId preserves request eventId; result causationId MUST equal request eventId.
  replay: Replayed requests preserve eventId and payload; zero-value and negative commands are invalid.
$defs:
  money:
    type: string
    pattern: "^[0-9]+\\.[0-9]{2}$"
  positiveMoney:
    type: string
    pattern: "^(?:0\\.(?:0[1-9]|[1-9][0-9])|[1-9][0-9]*\\.[0-9]{2})$"
    description: Strictly positive money for bank commands; zero-value commands are omitted.
  uuid:
    type: string
    format: uuid
  inspectionSettlementResultV1:
    type: object
    required: [resultSchemaVersion, measuredQuantityKg, acceptedQuantityKg, qualityDisposition, determinedAt]
    additionalProperties: false
    properties:
      resultSchemaVersion: {const: "1.0"}
      measuredQuantityKg: {type: number, minimum: 0}
      acceptedQuantityKg: {type: number, minimum: 0}
      qualityDisposition: {enum: [CONFORMING, PARTIALLY_CONFORMING, NON_CONFORMING, INCONCLUSIVE]}
      determinedAt: {type: string, format: date-time}
    x-invariant: acceptedQuantityKg must be less than or equal to measuredQuantityKg.
  baseEnvelope:
    $ref: "./event-envelope.yaml"
  contractSigned:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: contract.signed}
          producer: {const: contract-service}
          payload:
            type: object
            required: [contractId, commodity, buyerId, sellerId, totalAmount, buyerDepositAmount, sellerDepositAmount, signedContentHash, signedAt]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              commodity: {enum: [COFFEE, RICE, RUBBER, CASHEW]}
              buyerId: {$ref: "#/$defs/uuid"}
              sellerId: {$ref: "#/$defs/uuid"}
              totalAmount: {$ref: "#/$defs/money"}
              buyerDepositAmount: {$ref: "#/$defs/money"}
              sellerDepositAmount: {$ref: "#/$defs/money"}
              signedContentHash: {type: string, pattern: "^[a-f0-9]{64}$"}
              signedAt: {type: string, format: date-time}
            additionalProperties: false
        x-publisher: contract-service
        x-consumers: [escrow-service, analytics-service, audit-service]
        x-source: milestone-escrow-phase2-design.md section 7.2
        x-verification-matrix: [3, 11c, 11f]
  escrowDepositLocked:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: escrow.deposit_locked}
          producer: {const: escrow-service}
          payload:
            type: object
            required: [contractId, buyerDepositState, sellerDepositState]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              buyerDepositState: {enum: [DEPOSIT_LOCKED, DEPOSIT_RELEASED, DEPOSIT_SEIZED]}
              sellerDepositState: {enum: [DEPOSIT_LOCKED, DEPOSIT_RELEASED, DEPOSIT_SEIZED]}
            additionalProperties: false
        x-publisher: escrow-service
        x-consumers: [contract-service, escrow-service]
        x-source: milestone-escrow-phase2-design.md section 7.2
        x-verification-matrix: [11]
  escrowDepositLockFailed:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: escrow.deposit_lock_failed}
          producer: {const: escrow-service}
          payload:
            type: object
            required: [contractId, failedLeg, buyerDepositState, sellerDepositState, reason]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              failedLeg: {enum: [BUYER, SELLER, BOTH]}
              buyerDepositState: {type: string}
              sellerDepositState: {type: string}
              reason: {type: string, minLength: 1}
            additionalProperties: false
        x-publisher: escrow-service
        x-consumers: [contract-service]
        x-source: milestone-escrow-phase2-design.md sections 3.1 and 7.2
        x-verification-matrix: [11, 11b]
  bankLockRequested:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: bank.lock_requested}
          producer: {const: escrow-service}
          payload:
            type: object
            required: [contractId, userId, entryType, amount, sourceEventId]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              milestoneId: {oneOf: [{$ref: "#/$defs/uuid"}, {type: "null"}]}
              userId: {$ref: "#/$defs/uuid"}
              entryType: {enum: [LOCK_BUYER_DEPOSIT, LOCK_SELLER_DEPOSIT, LOCK_MILESTONE]}
              amount: {$ref: "#/$defs/positiveMoney"}
              sourceEventId: {$ref: "#/$defs/uuid"}
            additionalProperties: false
        x-publisher: escrow-service
        x-consumers: [bank-service]
        x-source: bank-service-phase2-design.md section 3
        x-verification-matrix: [1, 6, 9]
        x-requires-correlation: true
  bankLockCompleted:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: bank.lock_completed}
          producer: {const: bank-service}
          payload:
            type: object
            required: [contractId, userId, entryType, amount, sourceEventId, ledgerEntryId]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              milestoneId: {oneOf: [{$ref: "#/$defs/uuid"}, {type: "null"}]}
              userId: {$ref: "#/$defs/uuid"}
              entryType: {enum: [LOCK_BUYER_DEPOSIT, LOCK_SELLER_DEPOSIT, LOCK_MILESTONE]}
              amount: {$ref: "#/$defs/positiveMoney"}
              sourceEventId: {$ref: "#/$defs/uuid"}
              ledgerEntryId: {$ref: "#/$defs/uuid"}
            additionalProperties: false
        x-publisher: bank-service
        x-consumers: [escrow-service]
        x-source: bank-service-phase2-design.md section 3
        x-contract-note: sourceEventId preserves the request eventId; request payload.sourceEventId equals request envelope eventId and result causationId equals that request eventId.
        x-requires-correlation: true
        x-requires-causation: true
  bankLockFailed:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: bank.lock_failed}
          producer: {const: bank-service}
          payload:
            type: object
            required: [contractId, userId, entryType, amount, sourceEventId, failureReason]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              milestoneId: {oneOf: [{$ref: "#/$defs/uuid"}, {type: "null"}]}
              userId: {$ref: "#/$defs/uuid"}
              entryType: {enum: [LOCK_BUYER_DEPOSIT, LOCK_SELLER_DEPOSIT, LOCK_MILESTONE]}
              amount: {$ref: "#/$defs/positiveMoney"}
              sourceEventId: {$ref: "#/$defs/uuid"}
              failureReason: {type: string, minLength: 1}
            additionalProperties: false
        x-publisher: bank-service
        x-consumers: [escrow-service]
        x-source: bank-service-phase2-design.md section 3
        x-contract-note: No retryability enum is added; escrow applies the retry policy from milestone-escrow design.
  bankReleaseRequested:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: bank.release_requested}
          producer: {const: escrow-service}
          payload:
            type: object
            required: [contractId, userId, entryType, amount, sourceEventId]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              milestoneId: {oneOf: [{$ref: "#/$defs/uuid"}, {type: "null"}]}
              userId: {$ref: "#/$defs/uuid"}
              entryType: {const: RELEASE_TO_SELLER}
              amount: {$ref: "#/$defs/positiveMoney"}
              sourceEventId: {$ref: "#/$defs/uuid"}
            additionalProperties: false
        x-publisher: escrow-service
        x-consumers: [bank-service]
        x-source: bank-service-phase2-design.md sections 3.1 and 3.3; SDS Event Catalog 4.2
  bankReleaseCompleted:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: bank.release_completed}
          producer: {const: bank-service}
          payload:
            type: object
            required: [contractId, userId, entryType, amount, sourceEventId, ledgerEntryId]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              milestoneId: {oneOf: [{$ref: "#/$defs/uuid"}, {type: "null"}]}
              userId: {$ref: "#/$defs/uuid"}
              entryType: {const: RELEASE_TO_SELLER}
              amount: {$ref: "#/$defs/positiveMoney"}
              sourceEventId: {$ref: "#/$defs/uuid"}
              ledgerEntryId: {$ref: "#/$defs/uuid"}
            additionalProperties: false
        x-publisher: bank-service
        x-consumers: [escrow-service]
        x-source: bank-service-phase2-design.md section 3; SDS Event Catalog 4.2
  bankReleaseFailed:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
        properties:
          eventType: {const: bank.release_failed}
          producer: {const: bank-service}
          payload:
            type: object
            required: [contractId, userId, entryType, amount, sourceEventId, failureReason]
            properties:
              contractId: {$ref: "#/$defs/uuid"}
              milestoneId: {oneOf: [{$ref: "#/$defs/uuid"}, {type: "null"}]}
              userId: {$ref: "#/$defs/uuid"}
              entryType: {const: RELEASE_TO_SELLER}
              amount: {$ref: "#/$defs/positiveMoney"}
              sourceEventId: {$ref: "#/$defs/uuid"}
              failureReason: {type: string, minLength: 1}
            additionalProperties: false
        x-publisher: bank-service
        x-consumers: [escrow-service]
        x-source: bank-service-phase2-design.md section 3; SDS Event Catalog 4.2
  bankSeizeRequested:
    allOf:
      - $ref: "./event-envelope.yaml"
      - type: object
