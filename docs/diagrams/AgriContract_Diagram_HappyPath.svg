<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 680 660">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="660" fill="white"/>

<!-- Participants -->
<rect x="10" y="16" width="88" height="34" rx="4" fill="white" stroke="#222" stroke-width="1.2"/>
<text font-family="Arial" font-size="11" font-weight="600" x="54" y="33" text-anchor="middle">Buyer / Seller</text>
<text font-family="Arial" font-size="10" x="54" y="44" text-anchor="middle" fill="#666">(via REST)</text>

<rect x="154" y="16" width="100" height="34" rx="4" fill="white" stroke="#222" stroke-width="1.2"/>
<text font-family="Arial" font-size="11" font-weight="600" x="204" y="38" text-anchor="middle">contract-svc</text>

<rect x="310" y="16" width="100" height="34" rx="4" fill="white" stroke="#222" stroke-width="1.2"/>
<text font-family="Arial" font-size="11" font-weight="600" x="360" y="38" text-anchor="middle">product-svc</text>

<rect x="466" y="16" width="100" height="34" rx="4" fill="white" stroke="#222" stroke-width="1.2"/>
<text font-family="Arial" font-size="11" font-weight="600" x="516" y="38" text-anchor="middle">escrow-svc</text>

<rect x="568" y="16" width="104" height="34" rx="4" fill="white" stroke="#888" stroke-width="1"/>
<text font-family="Arial" font-size="11" font-weight="600" x="620" y="38" text-anchor="middle">notification-svc</text>

<!-- Lifelines -->
<line x1="54" y1="50" x2="54" y2="636" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="204" y1="50" x2="204" y2="636" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="360" y1="50" x2="360" y2="636" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="516" y1="50" x2="516" y2="636" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="620" y1="50" x2="620" y2="636" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- Steps -->
<!-- 1 -->
<text font-family="Arial" font-size="10" x="6" y="82" fill="#999">1</text>
<line x1="54" y1="80" x2="196" y2="80" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" x="125" y="74" text-anchor="middle" fill="#333">POST /contracts (offer)</text>
<text font-family="Arial" font-size="10" x="206" y="92" fill="#888">→ OFFERED</text>

<!-- 2 -->
<text font-family="Arial" font-size="10" x="6" y="118" fill="#999">2</text>
<line x1="54" y1="116" x2="196" y2="116" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" x="125" y="110" text-anchor="middle" fill="#333">PUT /negotiate (0–n times)</text>
<text font-family="Arial" font-size="10" x="206" y="128" fill="#888">→ NEGOTIATING</text>

<!-- 3 -->
<text font-family="Arial" font-size="10" x="6" y="154" fill="#999">3</text>
<line x1="54" y1="152" x2="196" y2="152" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" x="125" y="146" text-anchor="middle" fill="#333">PUT /sign (×2 both parties)</text>
<text font-family="Arial" font-size="10" x="206" y="164" fill="#888">→ SIGNED</text>

<!-- 4 Feign -->
<text font-family="Arial" font-size="10" x="6" y="190" fill="#999">4</text>
<line x1="204" y1="188" x2="352" y2="188" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" x="278" y="182" text-anchor="middle" fill="#333">Feign: PUT /listings/{id}/close</text>
<line x1="352" y1="202" x2="212" y2="202" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" x="278" y="216" text-anchor="middle" fill="#888">200 OK — listing CLOSED</text>

<!-- 5 contract.signed -->
<text font-family="Arial" font-size="10" x="6" y="244" fill="#999">5</text>
<line x1="204" y1="242" x2="508" y2="242" stroke="#333" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" x="356" y="236" text-anchor="middle" fill="#333">event: contract.signed</text>
<text font-family="Arial" font-size="10" x="518" y="254" fill="#888">lock → LOCKED</text>

<!-- 6 escrow.locked → contract -->
<text font-family="Arial" font-size="10" x="6" y="280" fill="#999">6</text>
<line x1="508" y1="278" x2="212" y2="278" stroke="#333" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" x="360" y="272" text-anchor="middle" fill="#333">event: escrow.locked</text>
<text font-family="Arial" font-size="10" x="206" y="290" fill="#888">activate() → ACTIVE</text>

<!-- 7 notification -->
<text font-family="Arial" font-size="10" x="6" y="316" fill="#999">7</text>
<line x1="516" y1="314" x2="612" y2="314" stroke="#333" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" x="564" y="308" text-anchor="middle" fill="#333">escrow.locked</text>
<text font-family="Arial" font-size="10" x="578" y="326" fill="#888">email → Seller</text>

<!-- 8 confirm-delivery -->
<text font-family="Arial" font-size="10" x="6" y="358" fill="#999">8</text>
<line x1="54" y1="356" x2="196" y2="356" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" x="125" y="350" text-anchor="middle" fill="#333">PUT /confirm-delivery</text>
<text font-family="Arial" font-size="10" x="206" y="368" fill="#888">→ DELIVERED</text>

<!-- 9 contract.delivered -->
<text font-family="Arial" font-size="10" x="6" y="400" fill="#999">9</text>
<line x1="204" y1="398" x2="508" y2="398" stroke="#333" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" x="356" y="392" text-anchor="middle" fill="#333">event: contract.delivered</text>
<text font-family="Arial" font-size="10" x="518" y="410" fill="#888">release() → RELEASED</text>

<!-- 10 escrow.released → contract -->
<text font-family="Arial" font-size="10" x="4" y="440" fill="#999">10</text>
<line x1="508" y1="438" x2="212" y2="438" stroke="#333" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" x="360" y="432" text-anchor="middle" fill="#333">event: escrow.released</text>
<text font-family="Arial" font-size="10" x="206" y="450" fill="#888">settle() → SETTLED</text>

<!-- 11 notification -->
<text font-family="Arial" font-size="10" x="4" y="480" fill="#999">11</text>
<line x1="516" y1="478" x2="612" y2="478" stroke="#333" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="10" x="564" y="472" text-anchor="middle" fill="#333">escrow.released</text>
<text font-family="Arial" font-size="10" x="578" y="490" fill="#888">email → both</text>

<!-- Legend -->
<line x1="30" y1="540" x2="70" y2="540" stroke="#333" stroke-width="1"/>
<text font-family="Arial" font-size="10" x="76" y="544" fill="#666">sync REST</text>
<line x1="170" y1="540" x2="210" y2="540" stroke="#333" stroke-width="1" stroke-dasharray="4 2"/>
<text font-family="Arial" font-size="10" x="216" y="544" fill="#666">async event (RabbitMQ)</text>
<line x1="390" y1="540" x2="430" y2="540" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3 2"/>
<text font-family="Arial" font-size="10" x="436" y="544" fill="#666">sync response</text>
</svg>